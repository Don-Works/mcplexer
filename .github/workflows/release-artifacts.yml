name: Release artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release tag to verify and publish"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: verify-release-ref
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      commit: ${{ steps.release.outputs.commit }}
      short_commit: ${{ steps.release.outputs.short_commit }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.version) || github.ref }}

      - name: Require an exact SemVer tag checkout
        id: release
        env:
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="$REQUESTED_VERSION"
          if [[ ! "$VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "release version must be an exact v-prefixed SemVer tag, got: $VERSION" >&2
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" != "refs/tags/$VERSION" ]]; then
            echo "push ref $GITHUB_REF does not match requested release tag $VERSION" >&2
            exit 1
          fi
          TAG_REF="refs/tags/$VERSION"
          git show-ref --verify --quiet "$TAG_REF" || {
            echo "release tag does not exist: $TAG_REF" >&2
            exit 1
          }
          HEAD_COMMIT="$(git rev-parse HEAD)"
          TAG_COMMIT="$(git rev-parse "$TAG_REF^{commit}")"
          if [[ "$HEAD_COMMIT" != "$TAG_COMMIT" ]]; then
            echo "checked-out commit $HEAD_COMMIT does not match $TAG_REF ($TAG_COMMIT)" >&2
            exit 1
          fi
          NOTES_FILE="docs/releases/$VERSION.md"
          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "release notes are required at $NOTES_FILE" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          echo "short_commit=${TAG_COMMIT:0:12}" >> "$GITHUB_OUTPUT"

  verify:
    name: required-verification
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.version }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: cd web && npm ci

      - name: Build frontend
        run: cd web && npm run build

      - name: Lint frontend
        run: cd web && npm run lint

      - name: Test frontend
        run: cd web && npm test

      - name: Test Go
        run: go test ./...

      - name: Test P2P
        run: go test -tags p2p ./internal/p2p/...

      - name: Vet Go and P2P
        run: go vet -tags p2p ./...

      - name: Lint Go and P2P
        uses: golangci/golangci-lint-action@db9de0fc1a667e1a49d2291a1a042dff081d78f6 # v9
        with:
          version: v2.9.0
          args: --build-tags p2p

      - name: Build slim and P2P binaries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.short_commit }}
        run: |
          set -euo pipefail
          LDFLAGS="-X main.buildVersion=${VERSION} -X main.buildCommit=${COMMIT} -X github.com/don-works/mcplexer/internal/gateway.buildVersion=${VERSION}"
          go build -trimpath -ldflags "$LDFLAGS" -o "$RUNNER_TEMP/mcplexer-slim" ./cmd/mcplexer
          go build -trimpath -tags p2p -ldflags "$LDFLAGS" -o "$RUNNER_TEMP/mcplexer-p2p" ./cmd/mcplexer
          "$RUNNER_TEMP/mcplexer-slim" version --json
          "$RUNNER_TEMP/mcplexer-p2p" version --json

      - name: Check dead code
        run: sh scripts/check-deadcode.sh

      - name: Test clean install
        run: bash scripts/test-install.sh

  build-release:
    name: build-release-archives
    runs-on: macos-latest
    needs: [prepare, verify]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.version }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build and inspect release archives
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.short_commit }}
          DIST_DIR: ${{ github.workspace }}/dist
          WORK_DIR: ${{ runner.temp }}/mcplexer-release-work
        run: bash scripts/build-release.sh

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/mcplexer_${{ needs.prepare.outputs.version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Checksum and re-verify complete payload
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.short_commit }}
        run: |
          set -euo pipefail
          test -s "dist/mcplexer_${VERSION}.spdx.json"
          bash scripts/write-release-checksums.sh dist
          bash scripts/release-smoke.sh --dist dist --version "$VERSION" --commit "$COMMIT" --structure-only

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ needs.prepare.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 3

  archive-smoke:
    name: smoke-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: [prepare, build-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: macos
            runner: macos-latest
          - platform: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.version }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: matrix.platform != 'linux'
        with:
          go-version-file: go.mod
          cache: true

      - name: Test isolated workspace portability
        if: matrix.platform != 'linux'
        env:
          CGO_ENABLED: "0"
        run: >-
          go test -count=1 -timeout=15m
          ./internal/models
          ./internal/pathguard
          ./internal/gateway
          ./internal/workers/admin
          ./internal/workers/runner
          ./internal/store/sqlite
          ./cmd/mcplexer

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Verify and execute native release archive
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.short_commit }}
        run: bash scripts/release-smoke.sh --dist dist --version "$VERSION" --commit "$COMMIT"

  publish:
    name: publish-verified-release
    runs-on: ubuntu-latest
    needs: [prepare, archive-smoke]
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.version }}

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Recheck tag and refuse an existing release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          EXPECTED_COMMIT: ${{ needs.prepare.outputs.commit }}
        run: |
          set -euo pipefail
          TAG_COMMIT="$(git rev-parse "refs/tags/$VERSION^{commit}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [[ "$TAG_COMMIT" != "$EXPECTED_COMMIT" || "$HEAD_COMMIT" != "$EXPECTED_COMMIT" ]]; then
            echo "release tag or checkout changed after verification" >&2
            exit 1
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "refusing to replace existing release or assets for $VERSION" >&2
            exit 1
          fi

      - name: Attest release provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Select archive subjects for the SBOM
        run: |
          set -euo pipefail
          awk '$2 ~ /\.(tar\.gz|zip)$/ { print }' dist/checksums.txt > "${RUNNER_TEMP}/archive-checksums.txt"
          test "$(wc -l < "${RUNNER_TEMP}/archive-checksums.txt")" -eq 6

      - name: Attest release SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: ${{ runner.temp }}/archive-checksums.txt
          sbom-path: dist/mcplexer_${{ needs.prepare.outputs.version }}.spdx.json

      - name: Publish immutable release and assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" dist/* \
            --verify-tag \
            --title "$VERSION" \
            --notes-file "docs/releases/$VERSION.md"
