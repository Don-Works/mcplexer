name: Public hygiene

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: public-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Scan public files without printing matched values
        env:
          MCPLEXER_PUBLIC_HYGIENE_PATTERNS: ${{ secrets.MCPLEXER_PUBLIC_HYGIENE_PATTERNS }}
        run: bash scripts/check-public-hygiene.sh
