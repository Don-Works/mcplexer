name: Build (slim + p2p)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        run: cd web && npm ci && npm run build

      - name: Go test suite
        run: go test ./...

      - name: Go test (p2p)
        run: go test -tags p2p ./internal/p2p/...

      - name: Frontend tests
        run: cd web && npm test

  isolation-portability:
    name: isolation-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
          - platform: windows
            runner: windows-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test isolated workspace portability
        run: >-
          go test -count=1 -timeout=15m
          ./internal/models
          ./internal/pathguard
          ./internal/gateway
          ./internal/workers/admin
          ./internal/workers/runner
          ./internal/store/sqlite
          ./cmd/mcplexer

  build:
    name: build-${{ matrix.tag || 'slim' }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: ""
            output: bin/mcplexer
            artifact: mcplexer-slim
          - tag: "p2p"
            output: bin/mcplexer-p2p
            artifact: mcplexer-p2p
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        run: cd web && npm ci && npm run build

      - name: Build
        env:
          BUILD_TAG: ${{ matrix.tag }}
          OUTPUT: ${{ matrix.output }}
        run: |
          mkdir -p bin
          VERSION="$(git describe --tags --dirty --always --abbrev=12 2>/dev/null || echo dev)"
          COMMIT="$(git rev-parse --short=12 HEAD 2>/dev/null || echo unknown)"
          LDFLAGS="-X main.buildVersion=${VERSION} -X main.buildCommit=${COMMIT} -X github.com/don-works/mcplexer/internal/gateway.buildVersion=${VERSION}"
          if [ -n "$BUILD_TAG" ]; then
            go build -tags "$BUILD_TAG" -ldflags "$LDFLAGS" -o "$OUTPUT" ./cmd/mcplexer
          else
            go build -ldflags "$LDFLAGS" -o "$OUTPUT" ./cmd/mcplexer
          fi
          ls -la "$OUTPUT"
          du -h "$OUTPUT"

      - name: Dead-code guard
        run: sh scripts/check-deadcode.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: ${{ matrix.output }}
          if-no-files-found: error
          retention-days: 7
