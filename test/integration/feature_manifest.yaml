# feature_manifest.yaml — the canonical list of shipped mcplexer surfaces
# the e2e suite is responsible for verifying. Read by scenario_manifest_
# coverage (see scenario_manifest_coverage.sh) to gate the run: any
# feature with zero matching scenario function FAILs the build.
#
# Format (deliberately yq-free; awk-parseable):
#
#   features:
#     - id: <stable.dotted.id>
#       surface: <rest|mcp_tool|mesh_kind|scheduler|ui_route|secret_type|cli|sandbox>
#       owner: <epic id or 'core'>
#       scenario_functions: [<bash function names>]
#
# Adding a feature?
#   1. Bump this file with the entry.
#   2. Add a scenario function (in scenarios.sh or a sourced scenario_*.sh)
#      whose name appears in scenario_functions.
#   3. Run `make test-integration` — the coverage step will accept it.
#
# Removing a feature? Delete the row. The coverage step doesn't enforce
# the inverse (orphan scenario functions are allowed, since you may keep
# a regression test for a feature that's been removed).
#
# Seeded with the surfaces visible in scenarios.sh main() as of 2026-05-27.
# This is intentionally NOT exhaustive yet — A3 ships the gate + a baseline;
# follow-on tasks under epic 01KSK91Q4W8TNED9MAF0CTRVKC backfill the
# manifest as new features land.

