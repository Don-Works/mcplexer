  # ---- Log monitoring (logwatch) ------------------------------------------
  # Two production incidents drive this block; see lib_monitoring.sh for the
  # measured signal shape and the test-hook contract. Until 2026-07-20 there
  # were ZERO monitoring scenarios here, which is precisely why a detector that
  # could not fire passed every unit test it had.
  # 42.x covers the COLLECTION path itself. It is listed before the detector
  # entries because every one of them stands on it: the rig collects from a
  # real sshd (log-host) whose `docker` CLI replays fixtures, so the lines
  # reach the store through sshx, the --since window, the cursor and the
  # distiller rather than a test-only store seam.
  - id: monitoring.collect.ssh_pull_end_to_end
